<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QURA AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b1120, #030712);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Animated particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(99, 102, 241, 0.4);
            border-radius: 50%;
            animation: floatParticle 15s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        /* Navigation bar */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 28px;
            display: flex;
            gap: 32px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .navbar a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            font-size: 16px;
        }
        .navbar a:hover, .navbar a.active {
            color: #c084fc;
            text-shadow: 0 0 8px #c084fc;
        }
        .main-content {
            position: relative;
            z-index: 2;
            padding-top: 100px;
            min-height: 100vh;
        }
        @media (max-width: 700px) {
            .navbar { gap: 16px; padding: 10px 20px; }
            .navbar a { font-size: 13px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="particles" id="particles"></div>
<div class="navbar">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
    <a href="/chat" class="{% if request.path == '/chat' %}active{% endif %}">Chat</a>
    <a href="/advance" class="{% if request.path == '/advance' %}active{% endif %}">Advance AI</a>
    <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a>
</div>
<div class="main-content">
    {% block content %}{% endblock %}
</div>
<script>
    // Generate floating particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 80; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 6 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = 8 + Math.random() * 15 + 's';
            container.appendChild(p);
        }
    }
    createParticles();
</script>
</body>
</html>
